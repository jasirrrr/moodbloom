name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean
      
      - name: Install CocoaPods
        run: |
          cd ios
          pod install
      
      - name: Build iOS
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace -scheme app -configuration Release -destination "generic/platform=iOS" build CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30
      
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/
          if-no-files-found: warn
