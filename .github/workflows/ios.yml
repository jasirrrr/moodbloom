name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean
      
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update --verbose 2>&1 | tail -50 || true
          ls -la *.xcworkspace
      
      - name: Build iOS
        run: |
          cd ios
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          if [ -n "$WORKSPACE" ]; then
            xcodebuild -workspace "$WORKSPACE" -scheme app -configuration Release \
              -destination "generic/platform=iOS Simulator" build \
              CODE_SIGNING_ALLOWED=NO 2>&1 | tail -20
          else
            echo "No workspace found"
          fi
      
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/
          if-no-files-found: warn
