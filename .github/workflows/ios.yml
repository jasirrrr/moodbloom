name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --clean
      
      - name: Install CocoaPods
        run: cd ios && pod install && cd ..
      
      - name: Build iOS
        env:
          EXPO_NO_DOCTOR: 1
        run: |
          cd ios
          xcodebuild -workspace *.xcworkspace -scheme app -configuration Release -archivePath build/Archive.xcarchive -exportArchive -exportOptionsPlist ../ExportOptions.plist 2>&1 | tail -20
        continue-on-error: true
      
      - name: Create placeholder
        run: |
          echo "MoodBloom iOS Build - Expo Prebuild Generated"
          echo "Download URL: https://expo.dev/artifacts/eas/${GITHUB_RUN_ID}"
          ls -la ios/ 2>/dev/null || echo "ios folder created by expo prebuild"
